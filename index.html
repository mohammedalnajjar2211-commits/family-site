<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FAMILY APPS</title>

<link rel="icon" type="image/png"
href="https://k.top4top.io/p_3783xyk9b1.png">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

/* ROOT */

:root{

--bg:#070b17;
--card:#10192d;
--card2:#16213d;

--text:#ffffff;
--sub:#94a3b8;

--main:#ff2346;
--main2:#ff4d6d;

--border:rgba(255,255,255,.08);

}

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Cairo',sans-serif;

background:
radial-gradient(circle at top right,#4a0d1a 0%,transparent 25%),
radial-gradient(circle at bottom left,#12091d 0%,transparent 20%),
var(--bg);

color:var(--text);

overflow-x:hidden;

}

/* SCROLLBAR */

::-webkit-scrollbar{
width:10px;
}

::-webkit-scrollbar-thumb{
background:var(--main);
border-radius:20px;
}

/* HEADER */

header{

position:fixed;
top:0;
width:100%;
z-index:999;

backdrop-filter:blur(15px);

background:rgba(5,8,18,.75);

border-bottom:1px solid var(--border);

}

.navbar{

width:92%;
max-width:1400px;

margin:auto;

height:72px;

display:flex;
align-items:center;
justify-content:space-between;

position:relative;

}

/* LOGO */

.logo{

font-size:22px;
font-weight:900;

color:var(--main);

letter-spacing:1px;

display:flex;
align-items:center;

z-index:1001;

}

/* MENU BUTTON */

.menu-toggle{

display:none;

font-size:25px;

color:white;

cursor:pointer;

z-index:1001;

}

/* NAV LINKS */

.nav-links{

display:flex;
align-items:center;
gap:22px;

}

.nav-links a{

color:white;
text-decoration:none;

font-size:15px;
font-weight:700;

transition:.3s;

}

.nav-links a:hover{

color:var(--main);

}

/* HERO */

.hero{

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

padding:80px 20px 50px;

position:relative;

}

.hero::before{

content:"";

position:absolute;

width:500px;
height:500px;

background:rgba(255,35,70,.12);

filter:blur(120px);

border-radius:50%;

top:10%;
right:-10%;

}

.hero-content{

max-width:850px;

position:relative;
z-index:2;

animation:fadeUp 1s ease;

/* رفع المحتوى للأعلى */

margin-top:-80px;

}

.hero h1{

font-size:60px;

line-height:1.3;

margin-bottom:20px;

font-weight:900;

}

.hero h1 span{

color:var(--main);

}

.hero p{

font-size:20px;

line-height:2;

color:var(--sub);

margin-bottom:35px;

padding:0 10px;

}

/* HERO BUTTON */

.hero-btn{

display:inline-flex;
align-items:center;
justify-content:center;
gap:12px;

padding:17px 32px;

border-radius:18px;

text-decoration:none;

font-weight:800;

background:
linear-gradient(135deg,var(--main),var(--main2));

color:white;

box-shadow:
0 10px 30px rgba(255,35,70,.35);

transition:.4s;

position:relative;

overflow:hidden;

}

.hero-btn::before{

content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:rgba(255,255,255,.15);

transition:.5s;

}

.hero-btn:hover::before{

left:100%;

}

.hero-btn:hover{

transform:translateY(-5px) scale(1.03);

}

/* SECTION */

.section{

width:92%;
max-width:1400px;

margin:auto;

padding-bottom:100px;

}

.section-title{

text-align:center;

margin-bottom:60px;

}

.section-title h2{

font-size:46px;

margin-bottom:12px;

color:var(--main);

}

.section-title p{

font-size:18px;

color:var(--sub);

}

/* GRID */

.apps-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:30px;

}

/* CARD */

.card{

background:
linear-gradient(180deg,var(--card),var(--card2));

border:1px solid var(--border);

border-radius:28px;

overflow:hidden;

transition:.5s;

position:relative;

box-shadow:
0 10px 30px rgba(0,0,0,.2);

}

.card:hover{

transform:
translateY(-10px);

border-color:
rgba(255,35,70,.3);

}

.card img{

width:100%;
height:220px;

object-fit:cover;

transition:.6s;

}

.card:hover img{

transform:scale(1.05);

}

.card-content{

padding:24px;

}

.app-top{

display:flex;
align-items:center;
justify-content:space-between;

gap:15px;

margin-bottom:15px;

}

.platform{

width:50px;
height:50px;

border-radius:15px;

display:flex;
align-items:center;
justify-content:center;

font-size:23px;

background:
rgba(255,255,255,.05);

border:1px solid var(--border);

flex-shrink:0;

}

.android{
color:#3ddc84;
}

.apple{
color:#ffffff;
}

.card h3{

font-size:26px;

margin-bottom:10px;

word-break:break-word;

}

.card p{

color:var(--sub);

line-height:1.9;

margin-bottom:20px;

font-size:15px;

}

/* DOWNLOAD BUTTON */

.download-btn{

display:flex;
justify-content:center;
align-items:center;
gap:12px;

padding:17px;

border-radius:18px;

text-decoration:none;

font-weight:800;

font-size:16px;

background:
linear-gradient(135deg,var(--main),var(--main2));

color:white;

transition:.4s;

box-shadow:
0 12px 30px rgba(255,35,70,.3);

}

.download-btn:hover{

transform:translateY(-4px);

}

/* CODE BOX */

.code-box{

margin-top:15px;

display:flex;
align-items:center;
justify-content:space-between;

gap:10px;

padding:14px 16px;

border-radius:18px;

background:
rgba(255,255,255,.05);

border:1px solid var(--border);

}

.app-code{

font-size:22px;
font-weight:900;

letter-spacing:2px;

word-break:break-word;

}

.copy-btn{

width:46px;
height:46px;

border:none;
border-radius:14px;

cursor:pointer;

background:
rgba(255,255,255,.06);

border:1px solid var(--border);

color:white;

font-size:18px;

transition:.3s;

flex-shrink:0;

}

.copy-btn:hover{

background:var(--main);

transform:scale(1.08);

}

/* FOOTER */

footer{

padding:35px 20px;

text-align:center;

color:var(--sub);

border-top:1px solid var(--border);

margin-top:50px;

font-size:15px;

}

/* WHATSAPP */

.whatsapp{

position:fixed;

left:18px;
bottom:18px;

width:60px;
height:60px;

border-radius:50%;

background:#25d366;

display:flex;
align-items:center;
justify-content:center;

font-size:30px;

color:white;

text-decoration:none;

z-index:9999;

box-shadow:
0 10px 30px rgba(37,211,102,.45);

transition:.3s;

}

.whatsapp:hover{

transform:scale(1.1);

}

/* ANIMATION */

@keyframes fadeUp{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

/* TABLET */

@media(max-width:992px){

.hero h1{
font-size:50px;
}

.hero p{
font-size:18px;
}

}

/* MOBILE */

@media(max-width:768px){

/* MENU BUTTON */

.menu-toggle{

display:block;

}

/* NAV */

.nav-links{

position:absolute;

top:72px;
right:0;

width:100%;

background:#0d1528;

border-top:1px solid var(--border);

display:flex;
flex-direction:column;

padding:0 20px;

gap:18px;

max-height:0;

overflow:hidden;

transition:.4s ease;

}

.nav-links.active{

max-height:300px;

padding:20px;

}

.nav-links a{

font-size:15px;

padding:5px 0;

}

/* HERO */

.hero{

padding-top:60px;

}

.hero-content{

margin-top:-120px;

}

.hero h1{

font-size:36px;
line-height:1.5;

}

.hero p{

font-size:16px;
line-height:1.9;

}

.hero-btn{

width:100%;
max-width:280px;

font-size:15px;

}

/* SECTION */

.section-title h2{

font-size:34px;

}

.section-title p{

font-size:15px;

}

.apps-grid{

grid-template-columns:1fr;

gap:25px;

}

.card h3{

font-size:24px;

}

.card img{

height:210px;

}

}

/* SMALL MOBILE */

@media(max-width:480px){

.logo{

font-size:20px;

}

.hero-content{

margin-top:-140px;

}

.hero h1{

font-size:30px;

}

.hero p{

font-size:15px;

}

.section{

width:94%;

}

.card-content{

padding:20px;

}

.download-btn{

font-size:15px;

padding:15px;

}

.app-code{

font-size:18px;

}

}

</style>

</head>

<body>

<!-- HEADER -->

<header>

<div class="navbar">

<div class="logo">
FAMILY APPS
</div>

<!-- MENU BUTTON -->

<div class="menu-toggle" id="menuToggle">

<i class="fa-solid fa-bars"></i>

</div>

<!-- NAV -->

<div class="nav-links" id="navLinks">

<a href="https://apps.familyiptv.net/">الرئيسية</a>
<a href="#apps">التطبيقات</a>
<a href="https://wa.me/9647809522129">تواصل معنا</a>

</div>

</div>

</header>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h1>

أفضل <span>تطبيقات IPTV</span><br>

للاندرويد والايفون

</h1>

<p>

منصة احترافية لتحميل أحدث تطبيقاتنا للاندرويد والايفون
بتصميم عصري وتجربة استخدام سريعة وآمنة

</p>

<a href="#apps" class="hero-btn">

<i class="fa-solid fa-download"></i>

ابدأ التحميل

</a>

</div>

</section>

<!-- APPS -->

<section class="section" id="apps">

<div class="section-title">

<h2>التطبيقات</h2>

<p>

6 تطبيقات اندرويد + 4 تطبيقات ايفون

</p>

</div>

<div class="apps-grid" id="appsContainer"></div>

</section>

<!-- FOOTER -->

<footer>

© 2026 FAMILY APPS — ALL RIGHTS RESERVED

</footer>

<!-- WHATSAPP -->

<a href="https://wa.me/9647809522129"
class="whatsapp"
target="_blank">

<i class="fa-brands fa-whatsapp"></i>

</a>

<!-- SCRIPT -->

<script>

const apps = [

{
name:"FAMILY PLUS",
platform:"android",
icon:"fa-brands fa-android",
image:"https://familychannels.tv/app-screen/family-activecode.jpeg",
description:"تطبيق فاملي بلص يعمل عن طريق الاكتف كود او اليوزرنيم وكلمة المرور",
download:"https://familychannels.tv/1/Family-activecode-plus.apk",
buttonText:"تحميل للاندرويد",
code:"630379"
},

{
name:"FAMILY PRO",
platform:"android",
icon:"fa-brands fa-android",
image:"https://j.top4top.io/p_37837180h1.png",
description:"تطبيق فاملي برو يعد الافضل وفيه خيارات متعددة للدخول",
download:"https://play.google.com/store/apps/details?id=com.shadeed.familypro",
buttonText:"تحميل للاندرويد",
code:"3520676"
}

];

const appsContainer =
document.getElementById("appsContainer");

appsContainer.innerHTML =
apps.map(app => `

<div class="card">

<img src="${app.image}" alt="${app.name}">

<div class="card-content">

<div class="app-top">

<h3>${app.name}</h3>

<div class="platform ${app.platform}">

<i class="${app.icon}"></i>

</div>

</div>

<p>

${app.description}

</p>

<a href="${app.download}"
class="download-btn"
target="_blank">

<i class="fa-solid fa-download"></i>

${app.buttonText}

</a>

<div class="code-box">

<span class="app-code">

${app.code}

</span>

<button class="copy-btn"
onclick="copyCode(this)">

<i class="fa-regular fa-copy"></i>

</button>

</div>

</div>

</div>

`).join("");

/* COPY FUNCTION */

function copyCode(button){

const code =
button.parentElement
.querySelector(".app-code")
.innerText;

navigator.clipboard.writeText(code);

button.innerHTML =
'<i class="fa-solid fa-check"></i>';

setTimeout(()=>{

button.innerHTML =
'<i class="fa-regular fa-copy"></i>';

},2000);

}

/* MOBILE MENU */

const menuToggle =
document.getElementById("menuToggle");

const navLinks =
document.getElementById("navLinks");

menuToggle.onclick = () => {

navLinks.classList.toggle("active");

};

</script>

</body>

</html>
