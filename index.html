<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FAMILY APPS</title>

<!-- FAVICON -->
<link rel="icon" type="image/png"
href="https://k.top4top.io/p_3783xyk9b1.png">

<!-- GOOGLE FONT -->
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap"
rel="stylesheet">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

/* ROOT */

:root{

--bg:#070b17;
--card:#10192d;
--card2:#16213d;

--text:#ffffff;
--sub:#94a3b8;

--main:#ff2346;
--main2:#ff4d6d;

--border:rgba(255,255,255,.08);

}

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Cairo',sans-serif;

background:
radial-gradient(circle at top right,#4a0d1a 0%,transparent 25%),
radial-gradient(circle at bottom left,#12091d 0%,transparent 20%),
var(--bg);

color:var(--text);

overflow-x:hidden;

}

/* SCROLLBAR */

::-webkit-scrollbar{
width:10px;
}

::-webkit-scrollbar-thumb{
background:var(--main);
border-radius:20px;
}

/* HEADER */

header{

position:fixed;
top:0;
width:100%;
z-index:999;

backdrop-filter:blur(15px);

background:rgba(5,8,18,.7);

border-bottom:1px solid var(--border);

}

.navbar{

width:92%;
max-width:1400px;

margin:auto;

height:78px;

display:flex;
align-items:center;
justify-content:space-between;

}

/* LOGO */

.logo{

font-size:28px;
font-weight:900;

color:var(--main);

letter-spacing:1px;

display:flex;
align-items:center;

}

/* NAV */

.nav-links{

display:flex;
align-items:center;
gap:22px;

}

.nav-links a{

color:white;
text-decoration:none;

font-size:16px;
font-weight:700;

transition:.3s;

}

.nav-links a:hover{

color:var(--main);

}

/* HERO */

.hero{

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

padding:140px 20px 70px;

position:relative;

}

.hero::before{

content:"";

position:absolute;

width:500px;
height:500px;

background:rgba(255,35,70,.12);

filter:blur(120px);

border-radius:50%;

top:10%;
right:-10%;

}

.hero-content{

max-width:850px;
position:relative;
z-index:2;

animation:fadeUp 1s ease;

}

.hero h1{

font-size:64px;

line-height:1.3;

margin-bottom:20px;

font-weight:900;

}

.hero h1 span{

color:var(--main);

}

.hero p{

font-size:20px;

line-height:2;

color:var(--sub);

margin-bottom:35px;

padding:0 10px;

}

/* HERO BUTTON */

.hero-btn{

display:inline-flex;
align-items:center;
justify-content:center;
gap:12px;

padding:17px 32px;

border-radius:18px;

text-decoration:none;

font-weight:800;

background:
linear-gradient(135deg,var(--main),var(--main2));

color:white;

box-shadow:
0 10px 30px rgba(255,35,70,.35);

transition:.4s;

position:relative;

overflow:hidden;

}

.hero-btn::before{

content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:rgba(255,255,255,.15);

transition:.5s;

}

.hero-btn:hover::before{

left:100%;

}

.hero-btn:hover{

transform:translateY(-5px) scale(1.03);

}

/* SECTION */

.section{

width:92%;
max-width:1400px;

margin:auto;

padding-bottom:100px;

}

.section-title{

text-align:center;

margin-bottom:60px;

}

.section-title h2{

font-size:48px;

margin-bottom:12px;

color:var(--main);

}

.section-title p{

font-size:18px;

color:var(--sub);

}

/* GRID */

.apps-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:30px;

}

/* CARD */

.card{

background:
linear-gradient(180deg,var(--card),var(--card2));

border:1px solid var(--border);

border-radius:28px;

overflow:hidden;

transition:.5s;

position:relative;

box-shadow:
0 10px 30px rgba(0,0,0,.2);

}

.card::before{

content:"";

position:absolute;

inset:0;

background:
linear-gradient(180deg,
rgba(255,255,255,.04),
transparent);

pointer-events:none;

}

.card:hover{

transform:
translateY(-10px)
scale(1.01);

box-shadow:
0 25px 50px rgba(0,0,0,.35);

border-color:
rgba(255,35,70,.3);

}

.card img{

width:100%;
height:220px;

object-fit:cover;

transition:.6s;

}

.card:hover img{

transform:scale(1.05);

}

.card-content{

padding:24px;

}

.app-top{

display:flex;
align-items:center;
justify-content:space-between;

gap:15px;

margin-bottom:15px;

}

.platform{

width:50px;
height:50px;

border-radius:15px;

display:flex;
align-items:center;
justify-content:center;

font-size:23px;

background:
rgba(255,255,255,.05);

border:1px solid var(--border);

flex-shrink:0;

}

.android{
color:#3ddc84;
}

.apple{
color:#ffffff;
}

.card h3{

font-size:27px;

margin-bottom:10px;

word-break:break-word;

}

.card p{

color:var(--sub);

line-height:1.9;

margin-bottom:20px;

font-size:15px;

}

/* DOWNLOAD BUTTON */

.download-btn{

display:flex;
justify-content:center;
align-items:center;
gap:12px;

padding:17px;

border-radius:18px;

text-decoration:none;

font-weight:800;

font-size:16px;

background:
linear-gradient(135deg,var(--main),var(--main2));

color:white;

position:relative;

overflow:hidden;

transition:.4s;

box-shadow:
0 12px 30px rgba(255,35,70,.3);

}

.download-btn::before{

content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:
rgba(255,255,255,.15);

transition:.5s;

}

.download-btn:hover::before{

left:100%;

}

.download-btn:hover{

transform:translateY(-4px);

box-shadow:
0 18px 35px rgba(255,35,70,.4);

}

/* CODE BOX */

.code-box{

margin-top:15px;

display:flex;
align-items:center;
justify-content:space-between;

gap:10px;

padding:14px 16px;

border-radius:18px;

background:
rgba(255,255,255,.05);

border:1px solid var(--border);

backdrop-filter:blur(10px);

}

.app-code{

font-size:22px;
font-weight:900;

letter-spacing:2px;

word-break:break-word;

}

.copy-btn{

width:46px;
height:46px;

border:none;
border-radius:14px;

cursor:pointer;

background:
rgba(255,255,255,.06);

border:1px solid var(--border);

color:white;

font-size:18px;

transition:.3s;

flex-shrink:0;

}

.copy-btn:hover{

background:var(--main);

transform:scale(1.08);

}

/* FOOTER */

footer{

padding:35px 20px;

text-align:center;

color:var(--sub);

border-top:1px solid var(--border);

margin-top:50px;

font-size:15px;

}

/* WHATSAPP */

.whatsapp{

position:fixed;

left:20px;
bottom:20px;

width:65px;
height:65px;

border-radius:50%;

background:#25d366;

display:flex;
align-items:center;
justify-content:center;

font-size:32px;

color:white;

text-decoration:none;

z-index:9999;

box-shadow:
0 10px 30px rgba(37,211,102,.45);

transition:.3s;

}

.whatsapp:hover{

transform:scale(1.12);

}

/* ANIMATION */

@keyframes fadeUp{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

/* TABLET */

@media(max-width:992px){

.hero h1{
font-size:52px;
}

.hero p{
font-size:18px;
}

.section-title h2{
font-size:40px;
}

}

/* MOBILE */

@media(max-width:768px){

.navbar{

height:70px;

}

.logo{

font-size:22px;

}

.nav-links{

gap:15px;

}

.nav-links a{

font-size:14px;

}

.hero{

padding-top:120px;

}

.hero h1{

font-size:38px;
line-height:1.5;

}

.hero p{

font-size:16px;
line-height:1.9;

}

.hero-btn{

width:100%;
max-width:280px;

font-size:15px;

}

.section-title h2{

font-size:34px;

}

.section-title p{

font-size:15px;

}

.apps-grid{

grid-template-columns:1fr;

gap:25px;

}

.card h3{

font-size:24px;

}

.card img{

height:210px;

}

.whatsapp{

width:58px;
height:58px;

font-size:28px;

left:15px;
bottom:15px;

}

}

/* SMALL MOBILE */

@media(max-width:480px){

.logo{

font-size:20px;

}

.nav-links{

display:none;

}

.hero h1{

font-size:31px;

}

.hero p{

font-size:15px;

}

.section{

width:94%;

}

.card-content{

padding:20px;

}

.download-btn{

font-size:15px;

padding:15px;

}

.app-code{

font-size:18px;

}

}

</style>

</head>
